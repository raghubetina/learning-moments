name: Publish

on:
  push:
    tags:
      - "v*"

# Required for npm Trusted Publishing OIDC exchange. The publish job
# exchanges this token with the npm registry for a short-lived publish
# credential; no long-lived NPM_TOKEN is stored in the repo.
permissions: {}

jobs:
  publish:
    name: Build, verify, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout the tagged commit
        uses: actions/checkout@v7

      # Node 24 ships with npm 11+, which is required for Trusted
      # Publishing's OIDC-for-publish-auth path. Earlier Node majors
      # ship with npm 10, which silently falls back to token auth and
      # fails with 404 against the registry.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Print npm version for diagnostics
        run: npm --version

      - name: Install dependencies without running lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Verify tag matches package version
        run: test "$GITHUB_REF_NAME" = "v$(node -p "require('./package.json').version")"

      - name: Type check
        run: npm run check

      - name: Run the test suite
        run: npm test

      # Verifies MANIFEST.json matches the shipped source files.
      # Catches "forgot to run build-manifest before tagging" as well
      # as any divergence between the committed manifest and the tree.
      - name: Verify file integrity against MANIFEST.json
        run: node src/cli.js audit

      - name: Show what will be packed
        run: npm pack --dry-run

      # Pack the tarball, install it into a throwaway consumer project,
      # and run `learning-moments audit` against the installed copy. This
      # catches packaging bugs the in-repo audit can't see — files
      # referenced by code but missing from `package.json` `files`,
      # executable bits stripped during pack, MANIFEST.json drift, and so on.
      - name: Verify packed tarball installs and audits cleanly
        run: npm run release-verify

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public

  release:
    name: Create GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create release from the published tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --repo "$GITHUB_REPOSITORY"
          --verify-tag
          --generate-notes
          --title "$GITHUB_REF_NAME"
